<svg xmlns="http://www.w3.org/2000/svg" width="6400" height="800" viewBox="0 0 6400 800" role="img" aria-labelledby="title desc">
<title id="title">The Corpus Is Manufactured, Not Found carousel deck</title><desc id="desc">Eight-slide social carousel deck in a single SVG artboard.</desc>
<defs><style>.slide{fill:#ffffff;stroke:#e2e8f0;stroke-width:4}.h{font:700 42px Arial,Helvetica,sans-serif;fill:#1f2933}.p{font:400 28px Arial,Helvetica,sans-serif;fill:#475569}.n{font:700 18px Arial,Helvetica,sans-serif;fill:#64748b}.line{stroke:#0f2742;stroke-width:5}.accent{fill:#047857}.amber{fill:#fef3c7;stroke:#b45309;stroke-width:3}.navy{fill:#f8fafc;stroke:#0f2742;stroke-width:3}.foot{font:400 16px Arial,Helvetica,sans-serif;fill:#94a3b8}</style></defs>
<g id="slide1"><rect class="slide" x="0" y="0" width="800" height="800"/><text x="70" y="95" class="n">01 / Recognition</text><text x="70" y="190" class="h">A folder full</text><text x="70" y="245" class="h">of documents is</text><text x="70" y="300" class="h">not a knowledge</text><text x="70" y="355" class="h">system.</text><rect x="90" y="455" width="120" height="80" class="amber"/><rect x="250" y="435" width="120" height="80" class="amber"/><rect x="410" y="465" width="120" height="80" class="amber"/><text x="70" y="710" class="foot">NKS-CAR-000001</text></g>
<g id="slide2" transform="translate(800,0)"><rect class="slide" width="800" height="800"/><text x="70" y="95" class="n">02 / Recognition</text><text x="70" y="190" class="h">A chat history</text><text x="70" y="245" class="h">is not a corpus.</text><path d="M100 380 C240 300 340 460 500 380 S690 435 720 360" fill="none" stroke="#94a3b8" stroke-width="8"/><path d="M100 500 C240 420 340 580 500 500 S690 555 720 480" fill="none" stroke="#cbd5e1" stroke-width="8"/><text x="70" y="650" class="p">Raw context is not reusable until structured.</text></g>
<g id="slide3" transform="translate(1600,0)"><rect class="slide" width="800" height="800"/><text x="70" y="95" class="n">03 / Reframe</text><text x="70" y="190" class="h">A corpus is</text><text x="70" y="245" class="h">manufactured.</text><rect x="120" y="380" width="160" height="90" class="amber"/><path d="M300 425 H430" class="line"/><rect x="460" y="350" width="220" height="150" class="navy"/><text x="570" y="435" class="p" text-anchor="middle">Knowledge</text><text x="570" y="470" class="p" text-anchor="middle">Engine</text><circle cx="680" cy="350" r="18" class="accent"/></g>
<g id="slide4" transform="translate(2400,0)"><rect class="slide" width="800" height="800"/><text x="70" y="95" class="n">04 / Framework</text><text x="70" y="175" class="h">Source → Proof</text><text x="70" y="230" class="h">→ Artifact → Corpus</text><text x="70" y="285" class="h">→ Publication</text><line x1="120" y1="430" x2="680" y2="430" class="line"/><circle cx="140" cy="430" r="25" class="accent"/><circle cx="275" cy="430" r="25" fill="#0f2742"/><circle cx="410" cy="430" r="25" fill="#0f2742"/><circle cx="545" cy="430" r="25" fill="#0f2742"/><circle cx="680" cy="430" r="25" class="accent"/></g>
<g id="slide5" transform="translate(3200,0)"><rect class="slide" width="800" height="800"/><text x="70" y="95" class="n">05 / Proof</text><text x="70" y="190" class="h">The artifact is</text><text x="70" y="245" class="h">the transition</text><text x="70" y="300" class="h">point.</text><rect x="190" y="390" width="420" height="190" class="navy"/><text x="400" y="465" class="p" text-anchor="middle">Stable ID</text><text x="400" y="510" class="p" text-anchor="middle">Source Lineage</text><text x="400" y="555" class="p" text-anchor="middle">Proof Boundary</text></g>
<g id="slide6" transform="translate(4000,0)"><rect class="slide" width="800" height="800"/><text x="70" y="95" class="n">06 / Application</text><text x="70" y="175" class="h">Extract.</text><text x="70" y="230" class="h">Classify.</text><text x="70" y="285" class="h">Prove.</text><text x="70" y="340" class="h">Connect.</text><text x="70" y="395" class="h">Reuse.</text><circle cx="560" cy="300" r="135" fill="#f8fafc" stroke="#0f2742" stroke-width="5"/><path d="M560 165 A135 135 0 1 1 559 165" fill="none" stroke="#047857" stroke-width="12"/></g>
<g id="slide7" transform="translate(4800,0)"><rect class="slide" width="800" height="800"/><text x="70" y="95" class="n">07 / Consequence</text><text x="70" y="190" class="h">The archive is</text><text x="70" y="245" class="h">not the asset.</text><text x="70" y="345" class="p">The manufacturing capability is.</text><rect x="110" y="450" width="210" height="130" class="amber"/><rect x="420" y="425" width="260" height="180" class="navy"/><text x="550" y="525" class="p" text-anchor="middle">Operating</text><text x="550" y="560" class="p" text-anchor="middle">System</text></g>
<g id="slide8" transform="translate(5600,0)"><rect class="slide" width="800" height="800"/><text x="70" y="95" class="n">08 / Invitation</text><text x="70" y="210" class="h">Stop saving.</text><text x="70" y="280" class="h">Start</text><text x="70" y="350" class="h">manufacturing.</text><line x1="70" y1="430" x2="640" y2="430" stroke="#047857" stroke-width="10"/><text x="70" y="560" class="p">Publishing is downstream.</text><text x="70" y="605" class="p">The corpus is the engine.</text></g>
</svg>
