<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Agentic AI DevOps Governance Pattern</title>
  <desc id="desc">Reference architecture showing integration points, agentic orchestration, observability, release decision, and feedback review.</desc>
  <rect width="1200" height="675" fill="#ffffff"/>
  <text x="60" y="70" font-family="Arial" font-size="34" font-weight="700" fill="#111111">Agentic AI DevOps Governance Pattern</text>
  <text x="60" y="105" font-family="Arial" font-size="18" fill="#333333">The pipeline can accelerate while release ownership remains accountable.</text>
  <g font-family="Arial" font-size="19" fill="#111111" text-anchor="middle">
    <rect x="55" y="210" width="195" height="95" rx="14" fill="#f3f4f6" stroke="#111111"/>
    <text x="152" y="250">Integration</text><text x="152" y="278">Points</text>
    <rect x="300" y="210" width="215" height="95" rx="14" fill="#f3f4f6" stroke="#111111"/>
    <text x="407" y="250">Agentic</text><text x="407" y="278">Orchestration</text>
    <rect x="565" y="210" width="190" height="95" rx="14" fill="#f3f4f6" stroke="#111111"/>
    <text x="660" y="265">Observability</text>
    <rect x="805" y="210" width="210" height="95" rx="14" fill="#f3f4f6" stroke="#111111"/>
    <text x="910" y="250">Release</text><text x="910" y="278">Decision</text>
  </g>
  <g stroke="#111111" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M250 258 H300"/><path d="M515 258 H565"/><path d="M755 258 H805"/>
    <path d="M910 305 V400 H152 V305"/>
  </g>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/></marker></defs>
  <rect x="55" y="400" width="960" height="90" rx="14" fill="#fafafa" stroke="#333333"/>
  <text x="80" y="435" font-family="Arial" font-size="20" font-weight="700" fill="#111111">Feedback Review</text>
  <text x="80" y="466" font-family="Arial" font-size="17" fill="#333333">Risk scores, rollout decisions, rollback triggers, and release ownership are reviewed before governance changes.</text>
  <text x="60" y="595" font-family="Arial" font-size="16" fill="#555555">Source: NKS-SRC-000004 · Artifact: NKS-ART-000017 · Diagnostic: NKS-DIA-000002</text>
