<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Agentic AI SecOps Control Pattern</title>
  <desc id="desc">Reference architecture showing Data Layer, Agentic Layer, Human-in-the-Loop, Security Guardrails, and Feedback Review.</desc>
  <rect width="1200" height="675" fill="#ffffff"/>
  <text x="60" y="70" font-family="Arial" font-size="34" font-weight="700" fill="#111111">Agentic AI SecOps Control Pattern</text>
  <text x="60" y="105" font-family="Arial" font-size="18" fill="#333333">Autonomous triage is not autonomous authority.</text>
  <g font-family="Arial" font-size="20" fill="#111111" text-anchor="middle">
    <rect x="70" y="210" width="190" height="95" rx="14" fill="#f3f4f6" stroke="#111111"/>
    <text x="165" y="265">Data Layer</text>
    <rect x="320" y="210" width="190" height="95" rx="14" fill="#f3f4f6" stroke="#111111"/>
    <text x="415" y="265">Agentic Layer</text>
    <rect x="570" y="210" width="210" height="95" rx="14" fill="#f3f4f6" stroke="#111111"/>
    <text x="675" y="250">Human-in-</text>
    <text x="675" y="278">the-Loop</text>
    <rect x="840" y="210" width="230" height="95" rx="14" fill="#f3f4f6" stroke="#111111"/>
    <text x="955" y="250">Security</text>
    <text x="955" y="278">Guardrails</text>
  </g>
  <g stroke="#111111" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M260 258 H320"/>
    <path d="M510 258 H570"/>
    <path d="M780 258 H840"/>
    <path d="M955 305 V400 H165 V305"/>
  </g>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/></marker></defs>
  <rect x="70" y="400" width="1000" height="90" rx="14" fill="#fafafa" stroke="#333333"/>
  <text x="95" y="435" font-family="Arial" font-size="20" font-weight="700" fill="#111111">Feedback Review</text>
  <text x="95" y="466" font-family="Arial" font-size="17" fill="#333333">Triage decisions, false positives, false negatives, and action boundaries are reviewed before governance is refined.</text>
  <text x="60" y="595" font-family="Arial" font-size="16" fill="#555555">Source: NKS-SRC-000004 · Artifact: NKS-ART-000017 · Diagnostic: NKS-DIA-000002</text>
