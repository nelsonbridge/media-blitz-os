    <rect x="305" y="210" width="220" height="95" rx="14" fill="#f3f4f6" stroke="#111111"/>
    <text x="415" y="250">Agentic</text><text x="415" y="278">Orchestrator</text>
    <rect x="575" y="210" width="205" height="95" rx="14" fill="#f3f4f6" stroke="#111111"/>
