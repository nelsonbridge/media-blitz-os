    <rect x="830" y="210" width="230" height="95" rx="14" fill="#f3f4f6" stroke="#111111"/>
    <text x="945" y="250">Bounded</text><text x="945" y="278">Remediation</text>
  </g>
  <g stroke="#111111" stroke-width="3" fill="none" marker-end="url(#arrow)">
