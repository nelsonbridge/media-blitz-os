  <rect x="45" y="400" width="1015" height="90" rx="14" fill="#fafafa" stroke="#333333"/>
  <text x="70" y="435" font-family="Arial" font-size="20" font-weight="700" fill="#111111">Continuity Review</text>
  <text x="70" y="466" font-family="Arial" font-size="17" fill="#333333">Signals, actions, business impact, and recovery quality are reviewed before authority expands.</text>
