<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Agentic AI Resiliency Oversight Pattern</title>
  <desc id="desc">Reference architecture showing telemetry ingestion, agentic orchestrator, human oversight, bounded remediation, and continuity review.</desc>
  <rect width="1200" height="675" fill="#ffffff"/>
