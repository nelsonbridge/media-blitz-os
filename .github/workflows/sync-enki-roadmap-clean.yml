name: Sync Enki Roadmap Clean

on:
  pull_request:
    branches:
      - sandbox

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: '1'

jobs:
  sync-generated-state:
    if: github.head_ref == 'roadmap/enki-sprints-25-36'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install project
        run: python -m pip install -e '.[test]'

      - name: Restore unrelated tracked runtime and test files from PR base
        run: |
          rm .github/workflows/sync-enki-roadmap-clean.yml
          git checkout bd47489001297035d1386e424483a9c41751959a -- src tests

      - name: Regenerate work-control projections
        run: python -c "from pathlib import Path; from nks.views.work_control import write_work_control_views; write_work_control_views(Path('.'))"

      - name: Regenerate authority manifest
        run: python -m nks.views.authority write .

      - name: Regenerate repository audit
        run: nks audit-repository .

      - name: Commit clean synchronized state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No synchronization changes required."
            exit 0
          fi
          git commit -m "Clean generated Enki roadmap projections"
          git push origin HEAD:${{ github.head_ref }}
