name: Sprint 47 Projection Sync

on:
  push:
    branches:
      - governance/promote-sprint-47-completion

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: governance/promote-sprint-47-completion
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runtime
        run: python -m pip install -e '.[test]'
      - name: Remove one-shot workflow and regenerate projections
        run: |
          rm .github/workflows/sprint47-projection-sync.yml
          python -c "from pathlib import Path; from nks.views.work_control import write_work_control_views; write_work_control_views(Path('.'))"
          python -m nks.views.authority write .
          nks generate-views .
          nks audit-repository .
      - name: Commit synchronized projections
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add generated .github/workflows/sprint47-projection-sync.yml
          git commit -m 'Synchronize Sprint 47 generated projections'
          git push origin HEAD:governance/promote-sprint-47-completion
