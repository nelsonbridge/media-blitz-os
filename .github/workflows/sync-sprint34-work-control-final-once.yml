name: Sync Sprint 34 Work Control Final Once

on:
  push:
    branches:
      - governance/promote-sprint-34-completion

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: governance/promote-sprint-34-completion
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runtime
        run: python -m pip install -e '.[test]'
      - name: Remove synchronizer before generation
        run: rm .github/workflows/sync-sprint34-work-control-final-once.yml
      - name: Regenerate exact work-control projections
        run: |
          python -c "from pathlib import Path; from nks.views.work_control import write_work_control_views; write_work_control_views(Path('.'))"
          python -m nks.views.authority write .
          nks audit-repository .
      - name: Commit exact synchronized final tree
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add generated/ .github/workflows/sync-sprint34-work-control-final-once.yml
          git diff --cached --quiet && exit 0
          git commit -m 'Synchronize Sprint 34 work-control projections'
          git push origin HEAD:governance/promote-sprint-34-completion
