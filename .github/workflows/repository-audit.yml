name: Repository Audit

on:
  push:
    branches: [sandbox]
    paths:
      - "src/nks/audit/**"
      - "src/nks/cli/**"
      - "records/**"
      - "generated/**"
      - "tests/test_repository_audit.py"
      - ".github/workflows/repository-audit.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repository-audit-sandbox
  cancel-in-progress: false

jobs:
  audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: sandbox
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install runtime
        run: python -m pip install -e ".[test]"
      - name: Run audit tests
        run: python -m pytest tests/test_repository_audit.py --no-cov
      - name: Generate repository audit
        run: nks audit-repository .
      - name: Commit generated audit reports
        run: |
          if git diff --quiet -- generated/audit; then
            echo "Audit reports unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/audit
          git commit -m "Generate repository audit reports"
          git push origin HEAD:sandbox
