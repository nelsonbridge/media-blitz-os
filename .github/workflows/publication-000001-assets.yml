name: Publication 000001 Assets

on:
  pull_request:
    branches: [sandbox]
    paths:
      - "scripts/render_publication_000001_assets.py"
      - "records/visual-requests/NKS-VRQ-00000*.json"
      - "assets/publication-000001/**"
      - "publishing/reviews/NKS-PUB-000001-visual-review.md"
      - ".github/workflows/publication-000001-assets.yml"
  push:
    branches:
      - product/publication-000001-assets
    paths:
      - "scripts/render_publication_000001_assets.py"
      - "records/visual-requests/NKS-VRQ-00000*.json"
      - "assets/publication-000001/**"
      - "publishing/reviews/NKS-PUB-000001-visual-review.md"
      - ".github/workflows/publication-000001-assets.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publication-000001-assets
  cancel-in-progress: false

jobs:
  render-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out asset branch
        uses: actions/checkout@v4
        with:
          ref: product/publication-000001-assets

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deterministic renderer dependency
        run: python -m pip install --upgrade pip && python -m pip install "Pillow==12.2.0"

      - name: Render Publication 000001 assets
        run: python scripts/render_publication_000001_assets.py --repository-root .

      - name: Verify dimensions, checksums, lineage, and pending-review state
        run: python scripts/render_publication_000001_assets.py --repository-root . --verify

      - name: Commit rendered assets
        run: |
          if git diff --quiet -- assets/publication-000001 && [ -z "$(git ls-files --others --exclude-standard assets/publication-000001)" ]; then
            echo "Rendered assets are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/publication-000001
          git commit -m "Render Publication 000001 visual assets"
          git push origin HEAD:product/publication-000001-assets

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publication-000001-visual-assets
          path: assets/publication-000001/
          if-no-files-found: error
