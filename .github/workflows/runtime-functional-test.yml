name: Runtime Functional Test

on:
  push:
    branches: [sandbox]
    paths:
      - "src/**"
      - "tests/**"
      - "records/**"
      - "pyproject.toml"
      - ".github/workflows/runtime-functional-test.yml"
  workflow_dispatch:

jobs:
  functional-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install runtime and test dependencies
        run: python -m pip install -e ".[test]"
      - name: Run complete portable runtime test suite
        run: python -m pytest
