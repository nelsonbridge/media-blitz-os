name: Fix Sprint 48 Hash Once

on:
  push:
    branches:
      - execution/sprint48-operational-release-current

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: execution/sprint48-operational-release-current
      - name: Normalize constructor payload
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/nks/application/operational_release.py')
          text = path.read_text(encoding='utf-8')
          old = '''    def create(cls, **values: object) -> "ProductionControlStatus":\n        payload = dict(values)\n        payload["status_sha256"] = canonical_sha256(payload)\n        return cls(**payload)'''
          new = '''    def create(cls, **values: object) -> "ProductionControlStatus":\n        payload = dict(values)\n        payload.setdefault("sprint45_reference", "records/sprints/NKS-SPR-045.json")\n        payload["status_sha256"] = canonical_sha256(payload)\n        return cls(**payload)'''
          if old not in text:
              raise SystemExit('expected constructor not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Commit fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/nks/application/operational_release.py
          git commit -m 'Normalize Sprint 48 production control hash payload'
          git push origin HEAD:execution/sprint48-operational-release-current
