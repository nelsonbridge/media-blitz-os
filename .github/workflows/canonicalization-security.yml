name: Canonicalization Security

on:
  pull_request:
    branches: [sandbox]
    paths:
      - "src/nks/domain/delivery.py"
      - "src/nks/application/delivery.py"
      - "src/nks/application/feedback.py"
      - "src/nks/cli/main.py"
      - "src/nks/views/markdown.py"
      - "src/nks/audit/repository.py"
      - "records/feedback/**"
      - "generated/**"
      - "tests/test_delivery_and_feedback.py"
      - "tests/test_generated_views.py"
      - "tests/test_cli.py"
      - "tests/test_canonical_publication_set.py"
      - "tests/test_dependency_extraction.py"
      - "tests/test_publication_000002_records.py"
      - "tests/test_repository_audit.py"
      - "docs/canonicalization-security-boundary.md"
      - ".github/workflows/canonicalization-security.yml"
  push:
    branches: [sandbox]
    paths:
      - "src/nks/domain/delivery.py"
      - "src/nks/application/delivery.py"
      - "src/nks/application/feedback.py"
      - "src/nks/cli/main.py"
      - "src/nks/views/markdown.py"
      - "src/nks/audit/repository.py"
      - "records/feedback/**"
      - "generated/**"
      - "tests/test_delivery_and_feedback.py"
      - "tests/test_generated_views.py"
      - "tests/test_cli.py"
      - "tests/test_canonical_publication_set.py"
      - "tests/test_dependency_extraction.py"
      - "tests/test_publication_000002_records.py"
      - "tests/test_repository_audit.py"
      - "docs/canonicalization-security-boundary.md"
      - ".github/workflows/canonicalization-security.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-canonicalization-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"
      - name: Run focused security tests
        run: >-
          python -m pytest
          tests/test_delivery_and_feedback.py
          tests/test_generated_views.py
          --no-cov
      - name: Regenerate authoritative views
        run: nks generate-views .
      - name: Commit regenerated Class 2 projections
        run: |
          if git diff --quiet -- generated && [ -z "$(git ls-files --others --exclude-standard generated)" ]; then
            echo "Generated authority projections are current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated
          git commit -m "Regenerate authoritative projections"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
      - name: Verify feedback projection is clean
        run: |
          if ! git diff --quiet -- generated/feedback-index.md; then
            echo "Feedback projection remains stale after regeneration."
            git diff -- generated/feedback-index.md
            exit 1
          fi
      - name: Upload regenerated authority projections
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-authority-projections
          path: generated/
          if-no-files-found: error
