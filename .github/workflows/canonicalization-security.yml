name: Canonicalization Security

on:
  pull_request:
    branches: [sandbox]
    paths:
      - "src/nks/domain/delivery.py"
      - "src/nks/application/delivery.py"
      - "src/nks/application/feedback.py"
      - "src/nks/cli/main.py"
      - "src/nks/views/markdown.py"
      - "records/feedback/**"
      - "generated/**"
      - "tests/test_delivery_and_feedback.py"
      - "tests/test_generated_views.py"
      - "docs/canonicalization-security-boundary.md"
      - ".github/workflows/canonicalization-security.yml"
  push:
    branches: [sandbox]
    paths:
      - "src/nks/domain/delivery.py"
      - "src/nks/application/delivery.py"
      - "src/nks/application/feedback.py"
      - "src/nks/cli/main.py"
      - "src/nks/views/markdown.py"
      - "records/feedback/**"
      - "generated/**"
      - "tests/test_delivery_and_feedback.py"
      - "tests/test_generated_views.py"
      - "docs/canonicalization-security-boundary.md"
      - ".github/workflows/canonicalization-security.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-canonicalization-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"
      - name: Run focused security tests
        run: >-
          python -m pytest
          tests/test_delivery_and_feedback.py
          tests/test_generated_views.py
          --no-cov
      - name: Regenerate authoritative views
        run: nks generate-views .
      - name: Commit missing declared Class 2 projections
        run: |
          missing=()
          for file in \
            generated/graph-index.md \
            generated/audit-report.md \
            generated/runtime-status-report.md \
            generated/corpus-health-dashboard.md \
            generated/publication-package-index.md
          do
            if ! git ls-files --error-unmatch "$file" >/dev/null 2>&1; then
              missing+=("$file")
            fi
          done

          if [ ${#missing[@]} -eq 0 ]; then
            echo "All declared Class 2 projections are already tracked."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${missing[@]}"
          git commit -m "Generate missing authoritative projections"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
      - name: Reject feedback projection drift
        run: |
          if ! git diff --quiet -- generated/feedback-index.md; then
            echo "Feedback projection is stale or manually edited."
            git diff -- generated/feedback-index.md
            exit 1
          fi
      - name: Upload regenerated authority projections
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-authority-projections
          path: generated/
          if-no-files-found: error
