name: Sync Enki Roadmap Once

on:
  pull_request:
    branches:
      - sandbox

permissions:
  contents: write

jobs:
  sync-generated-state:
    if: github.head_ref == 'roadmap/enki-sprints-25-36'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install project
        run: python -m pip install -e ".[test]"

      - name: Remove one-shot workflow before generation
        run: rm .github/workflows/sync-enki-roadmap-once.yml

      - name: Regenerate canonical views
        run: nks generate-views .

      - name: Regenerate repository audit
        run: nks audit-repository .

      - name: Commit synchronized generated state and self-removal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated-state changes required."
            exit 0
          fi
          git commit -m "Regenerate authority projections through Sprint 36"
          git push origin HEAD:${{ github.head_ref }}
