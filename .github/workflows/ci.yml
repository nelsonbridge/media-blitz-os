name: CI

on:
  push:
    branches:
      - sandbox
  pull_request:
    branches:
      - sandbox
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"

      - name: Run test suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest 2>&1 | tee pytest.log

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-reports
          path: |
            pytest.log
            coverage.json
            coverage.xml
          if-no-files-found: warn
