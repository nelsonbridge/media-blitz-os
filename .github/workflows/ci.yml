name: CI

on:
  push:
    branches:
      - sandbox
      - governance/promote-sprint-14-completion
  pull_request:
    branches:
      - sandbox
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"

      - name: Run test suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest 2>&1 | tee pytest.log

      - name: Generate release integrity evidence
        run: |
          python scripts/generate_release_integrity_evidence.py \
            --output-directory generated/release-integrity \
            --verifier-source-commit 8161b23b2e883278f25f3539ee3e392b8eb04033

      - name: Synchronize generated authority projections
        if: github.event_name == 'push' && github.ref_name == 'governance/promote-sprint-14-completion'
        run: |
          nks generate-views .
          nks audit-repository .
          python -m nks.views.authority write .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated
          if git diff --cached --quiet; then
            echo "Generated projections already synchronized."
          else
            git commit -m "Synchronize Sprint 14 generated authority projections"
            git push origin HEAD:governance/promote-sprint-14-completion
          fi

      - name: Upload test, coverage, and release-integrity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-reports
          path: |
            pytest.log
            coverage.json
            coverage.xml
            generated/release-integrity
          if-no-files-found: warn
