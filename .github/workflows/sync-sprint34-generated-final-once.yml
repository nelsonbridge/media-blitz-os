name: Sync Sprint 34 Generated Final Once

on:
  push:
    branches:
      - governance/promote-sprint-34-completion

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: governance/promote-sprint-34-completion
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runtime
        run: python -m pip install -e '.[test]'
      - name: Remove synchronizer before final-tree generation
        run: rm .github/workflows/sync-sprint34-generated-final-once.yml
      - name: Regenerate authority projections and audit
        run: |
          nks generate-views .
          nks audit-repository .
      - name: Commit synchronized projections
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add generated/ .github/workflows/sync-sprint34-generated-final-once.yml
          git diff --cached --quiet && exit 0
          git commit -m 'Synchronize Sprint 34 final-tree projections'
          git push origin HEAD:governance/promote-sprint-34-completion
