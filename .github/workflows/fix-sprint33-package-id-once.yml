name: Fix Sprint 33 Package Identity Once

on:
  push:
    branches:
      - execution/complete-enki-sprint-33

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: execution/complete-enki-sprint-33
      - name: Bind package identity to suite intent and projection
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/nks/application/hosted_downstream_integration.py')
          text = path.read_text(encoding='utf-8')
          old = '"package_id": f"{suite.value}-HOSTED-{projection.projection_hash.removeprefix(\'sha256:\')[:20]}",'
          new = '"package_id": f"{suite.value}-{intent.value}-{projection.projection_hash.removeprefix(\'sha256:\')[:20]}",'
          if old not in text:
              raise SystemExit('expected package identity source line not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Self-delete and commit
        run: |
          rm .github/workflows/fix-sprint33-package-id-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/nks/application/hosted_downstream_integration.py .github/workflows/fix-sprint33-package-id-once.yml
          git commit -m 'Bind downstream package identity to consumer intent'
          git push origin HEAD:execution/complete-enki-sprint-33
