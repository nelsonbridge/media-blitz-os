name: Apply Sprint 18 Hash Normalization Fix

on:
  push:
    branches: [execution/complete-enki-sprint-18]

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, '[s18-hash-fix]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: execution/complete-enki-sprint-18
      - name: Normalize optional telemetry defaults before hashing
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/nks/application/privacy_observability.py')
          text = path.read_text(encoding='utf-8')
          old = '''    def create(cls, **values: object) -> "TelemetryEvent":
        payload = dict(values)
        payload["event_sha256"] = canonical_sha256(payload)
        return cls(**payload)
'''
          new = '''    def create(cls, **values: object) -> "TelemetryEvent":
        payload = dict(values)
        payload.setdefault("metric_name", None)
        payload.setdefault("metric_value", None)
        payload.setdefault("metadata", {})
        payload["event_sha256"] = canonical_sha256(payload)
        return cls(**payload)
'''
          if old not in text:
              raise SystemExit('target create method was not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/nks/application/privacy_observability.py
          git commit -m "[s18-hash-fix] Normalize telemetry defaults before hashing"
          git push origin HEAD:execution/complete-enki-sprint-18
