name: Sprint 43 V2 Projection Sync

on:
  push:
    branches:
      - governance/promote-sprint-43-completion-v2

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: governance/promote-sprint-43-completion-v2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runtime
        run: python -m pip install -e '.[test]'
      - name: Remove one-shot workflow and regenerate projections
        run: |
          rm .github/workflows/sprint43-v2-projection-sync.yml
          python -c "from pathlib import Path; from nks.views.work_control import write_work_control_views; write_work_control_views(Path('.'))"
          python -m nks.views.authority write .
          nks generate-views .
          nks audit-repository .
      - name: Commit synchronized projections
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add generated .github/workflows/sprint43-v2-projection-sync.yml
          git commit -m 'Synchronize Sprint 43 completion projections'
          git push origin HEAD:governance/promote-sprint-43-completion-v2
