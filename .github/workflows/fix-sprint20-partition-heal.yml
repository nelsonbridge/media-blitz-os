name: Apply Sprint 20 Partition Healing Fix

on:
  push:
    branches: [execution/complete-enki-sprint-20]

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, '[s20-partition-fix]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: execution/complete-enki-sprint-20
      - name: Resume deferred deliveries after partition healing
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/nks/application/distributed_recovery.py')
          text = path.read_text(encoding='utf-8')
          old = '''    def heal_partition(self, key: str, *, now: datetime) -> list[DeliveryReceipt]:
        with self._lock:
            self._partitioned_keys.discard(key)
            pending = sorted(
                self._deferred.pop(key, []),
                key=lambda item: (item.sequence, item.created_at, item.delivery_id),
            )
        results: list[DeliveryReceipt] = []
        for intent in pending:
            results.append(self.deliver(intent, now=now))
        return results
'''
          new = '''    def heal_partition(self, key: str, *, now: datetime) -> list[DeliveryReceipt]:
        with self._lock:
            self._partitioned_keys.discard(key)
            pending = sorted(
                self._deferred.pop(key, []),
                key=lambda item: (item.sequence, item.created_at, item.delivery_id),
            )
            for intent in pending:
                prior = self._receipts.get(intent.delivery_id)
                if prior is not None and prior.state == DeliveryState.DEFERRED:
                    self._receipts.pop(intent.delivery_id, None)
        results: list[DeliveryReceipt] = []
        for intent in pending:
            results.append(self.deliver(intent, now=now))
        return results
'''
          if old not in text:
              raise SystemExit('partition healing block was not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/nks/application/distributed_recovery.py
          git commit -m "[s20-partition-fix] Resume deferred delivery after healing"
          git push origin HEAD:execution/complete-enki-sprint-20
