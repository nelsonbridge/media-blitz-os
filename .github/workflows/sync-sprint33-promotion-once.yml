name: Sync Sprint 33 Promotion Once

on:
  push:
    branches:
      - governance/promote-sprint-33-completion

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: governance/promote-sprint-33-completion
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runtime and tests
        run: python -m pip install -e '.[test]'
      - name: Regenerate work-control projections
        run: python -c "from pathlib import Path; from nks.views.work_control import write_work_control_views; write_work_control_views(Path('.'))"
      - name: Regenerate all authoritative views
        run: nks generate-views .
      - name: Regenerate repository audit
        run: nks audit-repository .
      - name: Regenerate authority manifest
        run: python -m nks.views.authority write .
      - name: Remove transient bytecode and self-delete
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} + || true
          rm .github/workflows/sync-sprint33-promotion-once.yml
      - name: Commit regenerated projections
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add generated/ .github/workflows/sync-sprint33-promotion-once.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Regenerate Sprint 33 authority projections'
          git push origin HEAD:governance/promote-sprint-33-completion
