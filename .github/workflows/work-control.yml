name: Work Control Authority

on:
  pull_request:
    branches: [sandbox]
  push:
    branches: [sandbox]

permissions:
  contents: read

jobs:
  verify-work-control:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime and tests
        run: python -m pip install -e '.[test]'
      - name: Run work-control tests
        run: python -m pytest tests/test_work_control.py tests/test_repository_audit.py
      - name: Regenerate work-control projections
        run: python -c "from pathlib import Path; from nks.views.work_control import write_work_control_views; write_work_control_views(Path('.'))"
      - name: Regenerate authority manifest
        run: python -m nks.views.authority write .
      - name: Reject generated drift
        run: git diff --exit-code -- generated/canonical-backlog.md generated/canonical-roadmap.md generated/state-authority-manifest.json
      - name: Verify authority manifest
        run: python -m nks.views.authority verify .
