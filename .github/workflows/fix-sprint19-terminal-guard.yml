name: Apply Sprint 19 Terminal Guard Fix

on:
  push:
    branches: [execution/complete-enki-sprint-19]

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, '[s19-terminal-fix]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: execution/complete-enki-sprint-19
      - name: Move terminal guard before restore eligibility
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/nks/application/retention_continuity.py')
          text = path.read_text(encoding='utf-8')
          old = '''        previous_state = previous.state if previous else LifecycleState.ACTIVE
        if action == LifecycleAction.RESTORE and previous_state not in {
            LifecycleState.ARCHIVED,
            LifecycleState.RESTRICTED,
        }:
            raise LifecycleConflict("only archived or restricted records may be restored")
        if previous_state in {LifecycleState.TOMBSTONED, LifecycleState.REVOKED}:
            raise LifecycleConflict("terminal lifecycle state cannot be changed")
'''
          new = '''        previous_state = previous.state if previous else LifecycleState.ACTIVE
        if previous_state in {LifecycleState.TOMBSTONED, LifecycleState.REVOKED}:
            raise LifecycleConflict("terminal lifecycle state cannot be changed")
        if action == LifecycleAction.RESTORE and previous_state not in {
            LifecycleState.ARCHIVED,
            LifecycleState.RESTRICTED,
        }:
            raise LifecycleConflict("only archived or restricted records may be restored")
'''
          if old not in text:
              raise SystemExit('terminal guard block was not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/nks/application/retention_continuity.py
          git commit -m "[s19-terminal-fix] Enforce terminal lifecycle state first"
          git push origin HEAD:execution/complete-enki-sprint-19
