name: Fix Sprint 48 Default Hashes Once

on:
  push:
    branches:
      - execution/sprint48-operational-release-current

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: execution/sprint48-operational-release-current
      - name: Normalize default-bearing hash payloads
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/nks/application/operational_release.py')
          text = path.read_text(encoding='utf-8')
          replacements = [
              (
                  '''    def create(cls, **values: object) -> "OperationalReadinessConclusion":\n        payload = dict(values)\n        payload["conclusion_sha256"] = canonical_sha256(payload)\n        return cls(**payload)''',
                  '''    def create(cls, **values: object) -> "OperationalReadinessConclusion":\n        payload = dict(values)\n        payload.setdefault("production_launch_authorized", False)\n        payload["conclusion_sha256"] = canonical_sha256(payload)\n        return cls(**payload)''',
              ),
              (
                  '''    def create(cls, **values: object) -> "HumanLaunchDecisionRequest":\n        payload = dict(values)\n        payload["request_sha256"] = canonical_sha256(payload)\n        return cls(**payload)''',
                  '''    def create(cls, **values: object) -> "HumanLaunchDecisionRequest":\n        payload = dict(values)\n        payload.setdefault("decision_state", LaunchDecisionState.PENDING_HUMAN_DECISION)\n        payload.setdefault("decision_authority", "HUMAN")\n        payload.setdefault("selected_disposition", None)\n        payload["request_sha256"] = canonical_sha256(payload)\n        return cls(**payload)''',
              ),
              (
                  '''    def create(cls, **values: object) -> "EnkiOperationalReleasePackage":\n        payload = dict(values)\n        payload["release_sha256"] = canonical_sha256(payload)\n        return cls(**payload)''',
                  '''    def create(cls, **values: object) -> "EnkiOperationalReleasePackage":\n        payload = dict(values)\n        payload.setdefault("schema_version", 1)\n        payload.setdefault("release_version", OPERATIONAL_RELEASE_VERSION)\n        payload.setdefault("external_services_budget_usd", 0)\n        payload.setdefault("production_launch_authorized", False)\n        payload.setdefault("launch_decision_state", LaunchDecisionState.PENDING_HUMAN_DECISION)\n        payload["release_sha256"] = canonical_sha256(payload)\n        return cls(**payload)''',
              ),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit('expected constructor not found')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/nks/application/operational_release.py
          git commit -m 'Normalize Sprint 48 default-bearing hash payloads'
          git push origin HEAD:execution/sprint48-operational-release-current
