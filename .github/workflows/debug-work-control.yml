name: Debug Work Control Generator

on:
  push:
    branches: [governance/promote-sprints-15-16-completion]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[test]'
      - name: Capture generator output
        shell: bash
        run: |
          set +e
          python -c "from pathlib import Path; from nks.views.work_control import write_work_control_views; write_work_control_views(Path('.'))" > work-control-generator.log 2>&1
          status=$?
          echo "exit_code=$status" >> work-control-generator.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: work-control-generator-diagnostic
          path: work-control-generator.log
