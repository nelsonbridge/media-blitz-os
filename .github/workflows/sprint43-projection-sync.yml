name: Sprint 43 Projection Sync

on:
  push:
    branches:
      - governance/promote-sprint-43-completion

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: governance/promote-sprint-43-completion
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime
        run: python -m pip install -e ".[test]"
      - name: Remove one-shot workflow before projection generation
        run: rm .github/workflows/sprint43-projection-sync.yml
      - name: Regenerate work-control projections
        run: python -c "from pathlib import Path; from nks.views.work_control import write_work_control_views; write_work_control_views(Path('.'))"
      - name: Regenerate authority manifest
        run: python -m nks.views.authority write .
      - name: Regenerate authoritative views
        run: nks generate-views .
      - name: Regenerate repository audit
        run: nks audit-repository .
      - name: Commit deterministic projection synchronization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated .github/workflows/sprint43-projection-sync.yml
          if git diff --cached --quiet; then
            echo "No projection changes required"
            exit 0
          fi
          git commit -m "Synchronize Sprint 43 generated projections [skip ci]"
          git push origin HEAD:governance/promote-sprint-43-completion
