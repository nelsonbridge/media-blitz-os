name: Runtime Coverage

on:
  push:
    branches:
      - sandbox
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-cover:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"

      - name: Run tests with branch coverage
        shell: bash
        run: |
          set -o pipefail
          pytest 2>&1 | tee pytest-output.txt

      - name: Upload coverage reports and test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-coverage
          path: |
            coverage.json
            coverage.xml
            pytest-output.txt
          if-no-files-found: warn
