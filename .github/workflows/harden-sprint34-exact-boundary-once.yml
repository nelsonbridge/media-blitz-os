name: Harden Sprint 34 Exact Boundary Once

on:
  push:
    branches:
      - execution/complete-enki-sprint-34

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: execution/complete-enki-sprint-34
      - name: Bind every work item to the registered exact product boundary
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/nks/application/multi_consumer_operations.py')
          text = path.read_text(encoding='utf-8')
          old_init = '''        self._adapter = ThreadSafeNoEffectProductAdapter()\n        self._service = HostedDownstreamConsumerService(\n            registry=registry,\n'''
          new_init = '''        self._registry = registry\n        self._adapter = ThreadSafeNoEffectProductAdapter()\n        self._service = HostedDownstreamConsumerService(\n            registry=registry,\n'''
          if old_init not in text:
              raise SystemExit('expected coordinator init block not found')
          text = text.replace(old_init, new_init)
          old_exec = '''    ) -> MultiConsumerWorkResult:\n        self._append_telemetry(\n            item,\n'''
          new_exec = '''    ) -> MultiConsumerWorkResult:\n        contract = self._registry.get(item.suite)\n        if item.boundary != contract.boundary:\n            raise PermissionError("work item boundary does not match registered product boundary")\n        self._append_telemetry(\n            item,\n'''
          if old_exec not in text:
              raise SystemExit('expected execute item block not found')
          path.write_text(text.replace(old_exec, new_exec), encoding='utf-8')
          PY
      - name: Self-delete and commit
        run: |
          rm .github/workflows/harden-sprint34-exact-boundary-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/nks/application/multi_consumer_operations.py .github/workflows/harden-sprint34-exact-boundary-once.yml
          git commit -m 'Enforce exact registered boundary per consumer workload'
          git push origin HEAD:execution/complete-enki-sprint-34
