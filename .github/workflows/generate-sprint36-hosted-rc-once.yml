name: Generate Sprint 36 Hosted RC Once

on:
  push:
    branches:
      - execution/complete-enki-sprint-36

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: execution/complete-enki-sprint-36
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runtime
        run: python -m pip install -e '.[test]'
      - name: Generate deterministic release manifests
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from nks.application.hosted_release_candidate import (
              hosted_release_candidate_fixture,
              human_deployment_decision_fixture,
          )
          root = Path('releases/enki-hosted-1.0-rc2')
          root.mkdir(parents=True, exist_ok=True)
          (root / 'readiness-manifest.json').write_text(
              json.dumps(hosted_release_candidate_fixture(), indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          (root / 'human-deployment-decision-request.json').write_text(
              json.dumps(human_deployment_decision_fixture(), indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY
      - name: Remove generator and commit final package
        run: |
          rm .github/workflows/generate-sprint36-hosted-rc-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add releases/enki-hosted-1.0-rc2 .github/workflows/generate-sprint36-hosted-rc-once.yml
          git commit -m 'Generate deterministic Enki hosted RC2 manifests'
          git push origin HEAD:execution/complete-enki-sprint-36
