name: Synchronize Sprint 16 Projections

on:
  push:
    branches:
      - roadmap/zero-cost-sprint-16-isolation
    paths:
      - records/sprints/NKS-SPR-016.json
      - records/work-items/BL-016.json
      - records/sprints/NKS-SPR-023.json
      - records/work-items/BL-023.json
      - .github/workflows/sync-sprint16-projections.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  synchronize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/zero-cost-sprint-16-isolation
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime
        run: python -m pip install -e '.[test]'
      - name: Regenerate canonical work-control projections
        run: python -c "from pathlib import Path; from nks.views.work_control import write_work_control_views; write_work_control_views(Path('.'))"
      - name: Commit generated projections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/canonical-backlog.md generated/canonical-roadmap.md
          if git diff --cached --quiet; then
            echo "Projections already synchronized."
          else
            git commit -m "Synchronize zero-cost Sprint 16 projections"
            git push origin HEAD:roadmap/zero-cost-sprint-16-isolation
          fi
