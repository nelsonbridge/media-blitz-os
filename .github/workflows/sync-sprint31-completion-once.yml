name: Sync Sprint 31 Completion Once

on:
  workflow_dispatch:
  push:
    branches:
      - governance/promote-sprint-31-completion

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: governance/promote-sprint-31-completion
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runtime
        run: python -m pip install -e '.[test]'
      - name: Regenerate authoritative projections
        run: |
          python -c "from pathlib import Path; from nks.views.work_control import write_work_control_views; write_work_control_views(Path('.'))"
          python -m nks.views.authority write .
      - name: Remove one-shot workflow before repository audit
        run: rm .github/workflows/sync-sprint31-completion-once.yml
      - name: Regenerate repository audit against final tree
        run: nks audit-repository .
      - name: Commit synchronized generated state and self-delete
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add generated/ .github/workflows/sync-sprint31-completion-once.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Synchronize Sprint 31 completion projections'
          git push origin HEAD:governance/promote-sprint-31-completion
